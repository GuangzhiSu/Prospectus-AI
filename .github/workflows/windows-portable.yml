# Builds the full Windows portable bundle and installer (embedded Node + local-first Python bootstrap + Next standalone).
# Linux-produced dist/ProspectusAI is NOT usable on Windows (wrong native modules).

name: Windows release bundle

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to upload to, for example 0.1.2"
        required: false
        default: "0.1.2"
      upload_to_release:
        description: "Upload build outputs to the GitHub release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: windows-portable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portable:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.release_tag }}"
            $upload = "${{ inputs.upload_to_release }}"
          } else {
            $tag = "${{ github.ref_name }}"
            $upload = "true"
          }
          if (-not $tag) { throw "Release tag is empty" }
          $version = $tag.TrimStart("v")
          "release_tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "upload_to_release=$upload" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build bundle (PowerShell)
        shell: pwsh
        run: |
          & "${{ github.workspace }}/packaging/windows/build-full-release.ps1" -SkipZip

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "${{ github.workspace }}/packaging/windows/build-installer.ps1" -SkipStage -Version "${{ steps.release_meta.outputs.version }}"

      - name: Create portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ github.workspace }}/dist/ProspectusAI/*" -DestinationPath "${{ github.workspace }}/dist/ProspectusAI-windows-x86_64.zip" -CompressionLevel Optimal

      - name: List dist output
        shell: pwsh
        run: Get-ChildItem -LiteralPath "${{ github.workspace }}/dist" -ErrorAction SilentlyContinue

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ProspectusAI-windows-portable
          path: dist/ProspectusAI-windows-x86_64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProspectusAI-windows-installer
          path: dist/ProspectusAI-Setup-${{ steps.release_meta.outputs.version }}.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload to GitHub Release
        if: ${{ steps.release_meta.outputs.upload_to_release == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          gh release view "$env:RELEASE_TAG" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:RELEASE_TAG" `
              --title "AI Prospectus v$env:RELEASE_VERSION" `
              --notes "Automated Windows release for Prospectus AI $env:RELEASE_VERSION."
          }
          gh release upload "$env:RELEASE_TAG" `
            "${{ github.workspace }}/dist/ProspectusAI-Setup-$env:RELEASE_VERSION.exe" `
            "${{ github.workspace }}/dist/ProspectusAI-windows-x86_64.zip" `
            --clobber
