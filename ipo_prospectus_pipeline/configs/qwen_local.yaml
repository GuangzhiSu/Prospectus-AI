# Local Qwen via Hugging Face transformers (no OpenAI API key).
# Install: pip install -r requirements.txt -r requirements-qwen.txt
#
# Default: https://huggingface.co/Qwen/Qwen3.5-27B — override with QWEN_MODEL or qwen_model.

llm_provider: qwen_local
qwen_model: Qwen/Qwen3.5-27B
max_tokens: 8192
temperature: 0.0

input_folder: ./pdfs
output_folder: ./outputs_qwen

batch_size: 32
save_raw_responses: false
sections_only: false
subsections_only: false

canonical_sections:
  - Summary
  - Risk Factors
  - Industry Overview
  - Business
  - Financial Information
  - History, Reorganization and Corporate Structure
  - Connected Transactions
  - Directors and Senior Management
  - Substantial Shareholders
  - Future Plans and Use of Proceeds
  - Underwriting
  - Structure of the Global Offering
  - Other

subsection_sections:
  - Summary
  - Risk Factors
  - Industry Overview
  - Business
  - Financial Information
  - History, Reorganization and Corporate Structure
